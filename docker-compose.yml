services:
  postgres:
    image: postgres:16-alpine
    container_name: planner_postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner_secret
    volumes:
      - planner_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: planner_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://planner:planner_secret@postgres:5432/planner
      - HF_HOME=/root/.cache/huggingface
    env_file:
      - .env
    volumes:
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  planner_pgdata:
    name: planner_pgdata
  whisper_cache:
    name: whisper_cache
